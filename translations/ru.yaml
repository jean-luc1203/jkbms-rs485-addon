---
configuration:
  # Раздел конфигурации JK-BMS
  jkbms_path:
    name: "🟪 JK-BMS → Путь к последовательному порту"
    description: "Путь к последовательному порту, к которому подключена JK-BMS (Меню: Настройки-Оборудование-Все оборудование)."
    
  jkbms_count:
    name: "🟪 JK-BMS → Количество модулей BMS"
    description: "Количество опрашиваемых модулей JK-BMS. Они должны быть подключены к шине RS485 (значение: от 1 до 15)."
    
  use_gateway:
    name: "🟨 JK-BMS → Использовать TCP-шлюз"
    description: "Включить связь через IP-шлюз (TCP Gateway) вместо локального последовательного порта."
    
  gateway_ip_port:
    name: "🟨 JK-BMS → IP-адрес шлюза + Порт"
    description: "IP-адрес + сетевой порт шлюза для удаленного доступа к JK-BMS (например, 192.168.1.100:5000)."
    
  communication_debug:
    name: "🔴 JK-BMS → Отладка связи"
    description: "Включить подробное отображение логов связи (для диагностики или поддержки)."
    
  bms_broadcasting:
    name: "🔴 JK-BMS → Вещание BMS (Broadcasting)"
    description: "В этом режиме BMS самостоятельно публикует агрегированные данные. Устройство должно быть в режиме Master (переключатель на 0000)."

  non_broadcasting_data_interval_s:
    name: "⏱️ JK-BMS → Интервал данных без вещания (с)"
    description: "Задержка между циклами опроса данных, когда режим вещания BMS отключен. Допустимый диапазон: от 1 до 30 секунд."
    
  CAN_bus_usage:
    name: "🔴 JK-BMS → Использование шины CAN"
    description: "Включить связь и передачу данных по шине CAN (если есть физическое подключение)."

  # Раздел конфигурации MQTT
  mqttadresse_port: 
    name: "🚩 MQTT → Адрес брокера + Порт"
    description: "Адрес брокера MQTT + порт (например, core-mosquitto.local.hass.io:1883 или локальный IP + порт)."
    
  mqttuser:
    name: "🚩 MQTT → Имя пользователя"
    description: "Имя пользователя для подключения к брокеру MQTT."
    
  mqttpass:
    name: "🚩 MQTT → Пароль"
    description: "Пароль, связанный с пользователем MQTT."

  # Node-RED Auth Configuration Section
  auth_username:
    name: "🔐 Node-RED → Editor Username"
    description: "Username for the Node-RED editor (port 1891) and HTTP endpoints. Leave blank to start Node-RED with no authentication (a warning will be logged)."

  auth_password:
    name: "🔐 Node-RED → Editor Password"
    description: "Password for the Node-RED editor and HTTP endpoints. Also protects /endpoint/* and static files. Leave blank to disable authentication (not recommended — port 1891 is reachable on the LAN)."

  Send_bip:
    name: "📊 Использование аддона"
    description: "Включить звуковой сигнал (бип) при запуске. Личные данные не передаются. Обработка соответствует регламенту GDPR."
