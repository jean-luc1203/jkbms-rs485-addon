      content: '# JK-BMS Advanced Diagnostics


        **SmartPhoton Unified Communication Diagnostics · UI v1.1**'
    - type: horizontal-stack
      cards:
      - type: markdown
        title: Current Health
        content: "**Status:** {% set st = states('sensor.jk_bms_aggregator_jkbms_health') %}{% if st == 'healthy' %}\U0001F7E2 **HEALTHY**{% elif st == 'degraded' %}\U0001F7E0 **DEGRADED**{% else %}\U0001F534 **COMMUNICATION ERROR**{% endif %}  \n\n**Health score:** {% set s = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_score') %}{% if s is none %}⚪ `starting`{% elif s >= 95 %}\U0001F7E2 `{{ s }} / 100`{% elif s >= 80 %}\U0001F7E0 `{{ s }} / 100`{% else %}\U0001F534 `{{ s }} / 100`{% endif %}  \n\n**Quality rating:** `{{ (state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_score_label') or 'starting') | title }}`"
