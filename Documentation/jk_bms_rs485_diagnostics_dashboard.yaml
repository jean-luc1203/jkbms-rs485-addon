views:
- title: Overview
  path: jk-bms-overview
  icon: mdi:heart-pulse
  type: panel
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: '# JK-BMS Communication Overview


        **SmartPhoton Unified Communication Diagnostics · UI v1.1**'
    - type: horizontal-stack
      cards:
      - type: entities
        title: JK-BMS Communication
        show_header_toggle: false
        entities:
        - entity: sensor.jk_bms_aggregator_jkbms_health
          name: Communication health
      - type: markdown
        title: Overall Communication Summary
        content: "## {% set st = states('sensor.jk_bms_aggregator_jkbms_health') %}{% if st == 'healthy' %}\U0001F7E2 **HEALTHY**{% elif st == 'degraded' %}\U0001F7E0 **DEGRADED**{% else %}\U0001F534 **COMMUNICATION ERROR**{% endif %}\n\n**Communication quality:** {% set s = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_score') %}{% if s is none %}⚪ **Starting**{% elif s >= 95 %}\U0001F7E2 **Excellent — {{ s }} / 100**{% elif s >= 90 %}\U0001F7E2 **Good — {{ s }} / 100**{% elif s >= 70 %}\U0001F7E0 **Fair — {{ s }} / 100**{% elif s >= 40 %}\U0001F534 **Poor — {{ s }} / 100**{% else %}\U0001F534 **Critical — {{ s }} / 100**{% endif %}  \n\n**Operating mode:** `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'mode') or 'unknown' }}`  \n\n**Transport:** `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'transport') or 'unknown' }}`  \n\n{% set mode = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'mode') or 'unknown' %}{% if mode == 'broadcast' %}**Detected BMS:**\
          \ `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'detected_bms') or 0 }}`{% else %}**BMS responding:** `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'responding_bms') if state_attr('sensor.jk_bms_aggregator_jkbms_health', 'responding_bms') is not none else 'n/a' }}` / `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'configured_bms') if state_attr('sensor.jk_bms_aggregator_jkbms_health', 'configured_bms') is not none else 'n/a' }}`{% endif %}  \n\n**Monitoring since:** `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'monitoring_uptime_human') or '0s' }}`"
    - type: horizontal-stack
      cards:
      - type: markdown
        title: Current Diagnostic
        content: "**State:** {% set st = states('sensor.jk_bms_aggregator_jkbms_health') %}{% if st == 'healthy' %}\U0001F7E2 **HEALTHY**{% elif st == 'degraded' %}\U0001F7E0 **DEGRADED**{% else %}\U0001F534 **COMMUNICATION ERROR**{% endif %}  \n\n**Explanation:**  \n{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_reason_text') or state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_reason') or 'n/a' }}  \n\n{% set raw = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_flags') or state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_flags_text') or [] %}{% set flags = raw.split(',') if raw is string else raw %}{% set info_names = ['many_short_buffers', 'high_multi_header_concat'] %}{% set ns = namespace(diag=[], info=[]) %}{% for flag in flags %}{% set f = flag | trim %}{% if f and f != 'none' %}{% if f in info_names %}{% set ns.info = ns.info + [f] %}{% else %}{% set ns.diag = ns.diag + [f] %}{% endif %}{% endif %}{% endfor %}**Diagnostic flags:**\
          \ `{{ ns.diag | join(', ') if ns.diag else 'none' }}`  \n\n**Informational observations:** `{{ ns.info | join(', ') if ns.info else 'none' }}`"
      - type: markdown
        title: Incident Memory
        content: "**Current score:** {% set s = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'health_score') %}{% if s is none %}⚪ `starting`{% elif s >= 95 %}\U0001F7E2 `{{ s }} / 100`{% elif s >= 80 %}\U0001F7E0 `{{ s }} / 100`{% else %}\U0001F534 `{{ s }} / 100`{% endif %}  \n\n**Worst score:** {% set w = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_health_score') %}{% if w is none %}⚪ `none`{% elif w >= 95 %}\U0001F7E2 `{{ w }} / 100`{% elif w >= 80 %}\U0001F7E0 `{{ w }} / 100`{% else %}\U0001F534 `{{ w }} / 100`{% endif %}  \n\n**Worst observed condition:**  \n{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_health_reason_text') or state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_health_reason') or 'none' }}  \n\n{% set w = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_health_score') %}{% set raw_wf = state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_health_flags') or state_attr('sensor.jk_bms_aggregator_jkbms_health',\
          \ 'worst_health_flags_text') or [] %}{% set wflags = raw_wf.split(',') if raw_wf is string else raw_wf %}{% set info_names = ['many_short_buffers', 'high_multi_header_concat'] %}{% set wns = namespace(diag=[], info=[]) %}{% for flag in wflags %}{% set f = flag | trim %}{% if f and f != 'none' %}{% if f in info_names %}{% set wns.info = wns.info + [f] %}{% else %}{% set wns.diag = wns.diag + [f] %}{% endif %}{% endif %}{% endfor %}{% if w is not none and w < 100 %}**Score penalty detail:**  \n{{ state_attr('sensor.jk_bms_aggregator_jkbms_health', 'worst_score_detail') or 'No stored penalty detail' }}  \n\n**Worst diagnostic flags:** `{{ wns.diag | join(', ') if wns.diag else 'none' }}`  \n\n**Worst informational observations:** `{{ wns.info | join(', ') if wns.info else 'none' }}`{% else %}**Score penalty:** `none`  \n\n**Informational observations:** `{{ wns.info | join(', ') if wns.info else 'none' }}`{% endif %}  \n\n**Recorded incidents:** `{{ state_attr('sensor.jk_bms_aggregator_jkbms_health',\
          \ 'health_incident_count') or 0 }}`"
- title: Advanced
